{% extends "base.html" %}

{% block content %} 
    <div class="container py-5">
        <div class="row">
            <div class="col-12 col-md-8">
                <h1 class="display-4">{{ post.title }}</h1>
                <div class="mb-3 text-body-secondary">{{ post.published_at }}</div>
                <p class="lead">{{ post.content }}</p>
            </div>
        </div>
    </div>
{% endblock %}
