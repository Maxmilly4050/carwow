{% extends "base.html" %}

{% block content %} 
    <div class="container py-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-8">
                <h1 class="display-4">{{ post.title }}</h1>
                <div class="mb-3 text-body-secondary">{{ post.published_at }}</div>
                <p class="lead">{{ post.content }}</p>
            </div>

            <div class="col-12 col-lg-4">
                {% if post.image %}
                    <img
                        src="{{ post.image.url }}"
                        alt="{{ post.title }}"
                        class="img-fluid rounded shadow-sm w-100"
                        style="max-height: 360px; object-fit: cover;"
                    >
                {% else %}
                    <div class="border rounded bg-body-secondary d-flex align-items-center justify-content-center text-body-secondary"
                         style="height: 260px;">
                        No image available
                    </div>
                {% endif %}
            </div>
        </div>

        <form method="post" action="{% url 'post' post.slug %}" class="mt-3">
            {% csrf_token %}
            <button type="submit" class="btn {% if is_favorite %}btn-warning{% else %}btn-outline-warning{% endif %}">
                {% if is_favorite %}Remove from Favorites{% else %}Add to Favorites{% endif %}
            </button>
        </form>

        {% include "blogs/comments.html" %}

{% endblock %}
